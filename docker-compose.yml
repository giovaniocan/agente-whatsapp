services:
  db:
    image: pgvector/pgvector:pg16   # postgres 16 + extensão vector (RAG, plano 10)
    environment:
      POSTGRES_USER: agente
      POSTGRES_PASSWORD: agente
      POSTGRES_DB: agente
    ports:
      - "5439:5432"   # porta alta no host p/ não colidir com Postgres local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agente"]
      interval: 3s
      timeout: 3s
      retries: 10
