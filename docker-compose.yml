services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: agente
      POSTGRES_PASSWORD: agente
      POSTGRES_DB: agente
    ports:
      - "5439:5432"   # 5433 no host p/ não colidir com Postgres local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agente"]
      interval: 3s
      timeout: 3s
      retries: 10
