name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agente
          POSTGRES_PASSWORD: agente
          POSTGRES_DB: agente
        ports: ["5439:5432"]
        options: >-
          --health-cmd "pg_isready -U agente"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4

      - name: Dependências
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Tipos (mypy strict)
        run: uv run mypy src

      - name: Migrations reproduzem o schema
        env:
          DATABASE_URL: postgresql+asyncpg://agente:agente@localhost:5439/agente
          PYTHONPATH: src
        run: uv run alembic upgrade head

      - name: Testes (unit + integração + e2e)
        env:
          AGENTE_TEST_DATABASE_URL: postgresql+asyncpg://agente:agente@localhost:5439/agente
        run: uv run pytest -q
